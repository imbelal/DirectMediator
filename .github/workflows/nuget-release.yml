name: Publish to NuGet

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Test
        run: dotnet test FastMediator.Tests/FastMediator.Tests.csproj --configuration Release

      - name: Extract version from tag
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          echo "VERSION=${VERSION#v}" >> $GITHUB_OUTPUT

      - name: Pack FastMediator.Abstractions
        run: >
          dotnet pack FastMediator.Abstractions/FastMediator.Abstractions.csproj
          --no-build --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o nupkgs

      - name: Pack FastMediator
        run: >
          dotnet pack FastMediator/FastMediator.csproj
          --no-build --configuration Release
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o nupkgs

      - name: Push to NuGet
        run: >
          dotnet nuget push "nupkgs/*.nupkg"
          --api-key ${{ secrets.NUGET_API_KEY }}
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
